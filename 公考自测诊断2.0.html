<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公考备考自测诊断</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 0 0 20px 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .progress-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            height: 8px;
            margin-top: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: white;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }
        .progress-text {
            font-size: 12px;
            margin-top: 8px;
            opacity: 0.9;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .question-group {
            margin-bottom: 30px;
        }
        .group-title {
            font-size: 16px;
            color: #4a90d9;
            font-weight: 600;
            margin-bottom: 15px;
            padding-left: 12px;
            border-left: 4px solid #4a90d9;
        }
        .question {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #eee;
        }
        .question:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .question-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 12px;
            color: #222;
        }
        .question-q {
            color: #4a90d9;
            font-weight: 600;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            display: flex;
            align-items: flex-start;
            padding: 12px 16px;
            background: #f8f9fa;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover {
            background: #e8f0f8;
        }
        .option.selected {
            background: #e8f0f8;
            border-color: #4a90d9;
        }
        .option input {
            display: none;
        }
        .option-marker {
            width: 22px;
            height: 22px;
            border: 2px solid #ccc;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
            transition: all 0.2s;
        }
        .option.selected .option-marker {
            background: #4a90d9;
            border-color: #4a90d9;
            color: white;
        }
        .option-text {
            font-size: 14px;
            color: #555;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-prev {
            background: #f0f0f0;
            color: #666;
        }
        .btn-prev:hover {
            background: #e0e0e0;
        }
        .btn-next {
            background: #667eea;
            color: white;
        }
        .btn-next:hover {
            background: #5a71d4;
        }
        .btn-next:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-submit {
            background: #52c41a;
        }
        .btn-submit:hover {
            background: #3d9a0d;
        }
        /* 结果页面 */
        .result-header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        .result-header h2 {
            font-size: 22px;
            margin-bottom: 8px;
        }
        .result-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .radar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .radar-chart {
            width: 460px;
            height: 360px;
        }
        .dimension-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .dimension-cards {
                grid-template-columns: 1fr;
            }
        }
        .dim-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .dim-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .dim-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        .dim-card-score {
            font-size: 20px;
            font-weight: 700;
            color: #4a90d9;
        }
        .dim-card-bar {
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .dim-card-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.8s ease;
        }
        .dim-card-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .status-red {
            background: #fff1f0;
            color: #cf1322;
        }
        .status-yellow {
            background: #fffbe6;
            color: #d48806;
        }
        .status-green {
            background: #f6ffed;
            color: #52c41a;
        }
        .detail-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .detail-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
        }
        .detail-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: #4a90d9;
            margin-right: 10px;
            border-radius: 2px;
        }
        .detail-item {
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .detail-item:last-child {
            border-bottom: none;
        }
        .detail-item-title {
            font-size: 14px;
            font-weight: 500;
            color: #222;
            margin-bottom: 6px;
        }
        .detail-item-content {
            font-size: 13px;
            color: #666;
            line-height: 1.7;
        }
        .restart-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .restart-btn:hover {
            background: #357abd;
        }
        .hidden {
            display: none;
        }
        .answer-review {
            margin-top: 30px;
        }
        .review-question {
            margin-bottom: 20px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .review-question-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .review-answer {
            font-size: 13px;
            color: #4a90d9;
            font-weight: 500;
        }
        /* 详细诊断样式 */
        .diagnosis-section {
            margin-bottom: 20px;
        }
        .diagnosis-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .diagnosis-content {
            font-size: 14px;
            color: #5a5a7a;
            line-height: 1.8;
            padding-left: 0;
        }
        .diagnosis-content.reminder {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(118, 75, 162, 0.08) 100%);
            padding: 14px 16px;
            border-radius: 10px;
            border-left: none;
        }
        .diagnosis-table {
            margin-top: 12px;
            overflow-x: auto;
        }
        .diagnosis-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .diagnosis-table th {
            background: #f8f9fa;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e8e8e8;
        }
        .diagnosis-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
            color: #555;
            line-height: 1.6;
        }
        .diagnosis-table .chapter-cell {
            color: #667eea;
            font-weight: 500;
            white-space: nowrap;
        }
        .diagnosis-table tr:last-child td {
            border-bottom: none;
        }
        /* 总结卡片样式 */
        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 24px;
            color: white;
            margin-bottom: 16px;
        }
        .summary-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .summary-subtitle {
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 16px;
        }
        .priority-group {
            margin-bottom: 12px;
        }
        .priority-group:last-child {
            margin-bottom: 0;
        }
        .priority-label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .priority-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .priority-tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .rules-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 16px;
        }
        .rules-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 14px;
        }
        .rules-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .rule-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .rule-dim {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }
        .rule-scores {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .score-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .all-good {
            background: linear-gradient(135deg, rgba(82, 196, 26, 0.1) 0%, rgba(82, 196, 26, 0.05) 100%);
            border: 1px solid rgba(82, 196, 26, 0.2);
            border-radius: 12px;
            padding: 16px 20px;
            text-align: center;
            color: #52c41a;
            font-size: 14px;
            font-weight: 500;
        }
        /* 优先级排序新样式 */
        .priority-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 20px 24px;
            color: white;
            margin-bottom: 20px;
        }
        .priority-header-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .priority-header-subtitle {
            font-size: 13px;
            opacity: 0.85;
        }
        .priority-section {
            margin-bottom: 16px;
        }
        .chapter-card {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .chapter-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chapter-dim-name {
            font-size: 15px;
            font-weight: 600;
        }
        .chapter-dim-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chapter-item {
            padding: 12px 14px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .chapter-name {
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 4px;
        }
        .chapter-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        .green-section {
            background: linear-gradient(135deg, rgba(82, 196, 26, 0.08) 0%, rgba(82, 196, 26, 0.03) 100%);
            border: 1px solid rgba(82, 196, 26, 0.15);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .green-title {
            font-size: 14px;
            font-weight: 600;
            color: #52c41a;
            margin-bottom: 10px;
        }
        .green-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .green-tag {
            background: rgba(82, 196, 26, 0.1);
            color: #52c41a;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 开始页面 -->
        <div id="startPage" class="card" style="padding: 0; overflow: hidden;">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 8px;"></div>
            <div style="text-align: center; padding: 50px 32px 40px;">
                <div style="width: 72px; height: 72px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; margin: 0 auto 28px; display: flex; align-items: center; justify-content: center;">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <h2 style="font-size: 26px; margin-bottom: 10px; color: #1a1a2e; font-weight: 600;">公考备考自测诊断</h2>
                <p style="color: #667eea; font-size: 14px; font-weight: 500; margin-bottom: 28px;">15道题 · 定位真正的卡点</p>
                
                <p style="color: #5a5a7a; font-size: 15px; margin-bottom: 36px; line-height: 1.8;">
                    你可能刚下定决心要考公<br>也可能已经刷了上百套题但分数就是不动<br>来测一测目前的卡点吧
                </p>
                
                <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 32px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span style="color: #999; font-size: 13px;">预计用时 5 分钟</span>
                </div>
                
                <button class="btn btn-next" style="max-width: 180px; padding: 14px 32px; font-size: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 25px; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.35);" onclick="startTest()">开始测试</button>
                
                <p style="color: #c8c8d8; font-size: 12px; margin-top: 20px;">完全匿名 · 立即查看结果</p>
            </div>
        </div>

        <!-- 测试页面 -->
        <div id="testPage" class="hidden">
            <div class="header">
                <h1>公考备考自测诊断</h1>
                <p>15道题，定位你真正的卡点</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">第 1/15 题</p>
            </div>

            <div class="card">
                <div class="group-title" id="groupTitle">🧭 认知扫盲维度（3题）</div>
                <div id="questionContainer"></div>

                <div class="btn-group">
                    <button class="btn btn-prev" id="prevBtn" onclick="prevQuestion()">上一题</button>
                    <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()">下一题</button>
                    <button class="btn btn-submit hidden" id="submitBtn" onclick="submitTest()">查看结果</button>
                </div>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="resultPage" class="hidden">
            <div class="result-header">
                <h2>你的备考诊断报告</h2>
                <p>根据你的答题情况生成了专属分析</p>
            </div>

            <div class="card">
                <div class="radar-container">
                    <canvas id="radarChart" class="radar-chart"></canvas>
                </div>
            </div>

            <div class="dimension-cards" id="dimensionCards"></div>

            <div class="detail-section">
                <div class="detail-title">各维度详细分析</div>
                <div id="detailContent"></div>
            </div>

            <div class="detail-section">
                <div class="detail-title">重点改进建议</div>
                <div id="suggestionsContent"></div>
            </div>

            <div class="detail-section">
                <div class="detail-title">答题回顾</div>
                <div id="answerReview" class="answer-review"></div>
            </div>

            <button class="restart-btn" onclick="restartTest()">重新测试</button>
        </div>
    </div>

    <script>
        // ========== 题目配置（可方便修改） ==========
        const QUESTIONS = [
            // 第一组：认知扫盲维度（Q1-Q3）
            {
                group: 0,
                groupName: "🧭 认知扫盲维度",
                q: "Q1",
                title: "你目前的状态是？",
                options: [
                    { label: "A", text: "在校大三大四，时间有，但完全不知道从哪下手", score: 1 },
                    { label: "B", text: "一边上班一边备考，每天能挤出的有效时间不到 3 小时", score: 2 },
                    { label: "C", text: "已经考过至少一次，这次是二战或三战", score: 3 },
                    { label: "D", text: "刚毕业或待业中，可以全职备考但有经济压力", score: 1 }
                ]
            },
            {
                group: 0,
                q: "Q2",
                title: "你知道行测五个模块，投入同样的100小时——哪个提分最多、哪个基本打了水漂吗？",
                options: [
                    { label: "A", text: "完全没概念。我每个模块平均分配时间，觉得都差不多重要", score: 1 },
                    { label: "B", text: "大概知道资料分析重要、常识不太值，但具体每个模块的投入产出数据说不清楚", score: 2 },
                    { label: "C", text: "清楚知道性价比排名，并且已经在按优先级分配每天的时间", score: 3 }
                ]
            },
            {
                group: 0,
                q: "Q3",
                title: "你手里现在有多少备考资料/课程？",
                options: [
                    { label: "A", text: "还没开始买，不知道买什么、看哪个老师", score: 1 },
                    { label: "B", text: "网盘里存了几十 G，关注了七八个老师的课，但大部分没打开过", score: 2 },
                    { label: "C", text: "只留了核心几样——真题、一本系统讲义、一门课，够用", score: 3 }
                ]
            },
            // 第二组：时间战场维度（Q4-Q6）
            {
                group: 1,
                groupName: "⏱️ 时间战场维度",
                q: "Q4",
                title: "离你计划参加的最近一次考试，还有多久？",
                options: [
                    { label: "A", text: "不到 2 个月——冲刺了", score: 1 },
                    { label: "B", text: "2-6 个月——拔高期", score: 2 },
                    { label: "C", text: "6 个月以上——长线作战", score: 3 }
                ]
            },
            {
                group: 1,
                q: "Q5",
                title: "你每天能保证的\u201C有效学习时间\u201D大概多少？（有效学习 = 脑子真的在动）",
                options: [
                    { label: "A", text: "3 小时以内，下班后就剩一口气", score: 1 },
                    { label: "B", text: "3-6 小时，还算正常", score: 2 },
                    { label: "C", text: "6 小时以上，可以全天投入", score: 3 }
                ]
            },
            {
                group: 1,
                q: "Q6",
                title: "你做套卷时会严格计时吗（包括涂答题卡）？",
                options: [

        // 渲染当前题目（单题渲染，性能最佳）
        function renderCurrentQuestion() {
            const q = QUESTIONS[currentQuestion];
            const selectedIdx = answers[currentQuestion];

            // 更新组标题
            document.getElementById('groupTitle').textContent = GROUP_TITLES[q.group];

            // 构建题目HTML
            let optionsHtml = '';
            for (let i = 0; i < q.options.length; i++) {
                const opt = q.options[i];
                const isSelected = selectedIdx === i;
                optionsHtml += `
                    <label class="option ${isSelected ? 'selected' : ''}" data-option="${i}">
                        <input type="radio" name="q${currentQuestion}" value="${i}" ${isSelected ? 'checked' : ''}>
                        <span class="option-marker">${opt.label}</span>
                        <span class="option-text">${opt.text}</span>
                    </label>
                `;
            }

            document.getElementById('questionContainer').innerHTML = `
                <div class="question-title">
                    <span class="question-q">${q.q}</span>. ${q.title}
                </div>
                <div class="options">${optionsHtml}</div>
            `;

            // 绑定选项点击事件（事件委托，无需循环绑定）
            document.querySelectorAll('#questionContainer .option').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.preventDefault();
                    const optIdx = parseInt(el.dataset.option);
                    selectOption(optIdx);
                });
            });

            // 更新进度条
            const answeredCount = answers.filter(a => a !== null).length;
            const progress = (answeredCount / QUESTIONS.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `第 ${currentQuestion + 1}/${QUESTIONS.length} 题`;

            // 更新按钮状态
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitBtn');
            if (currentQuestion === QUESTIONS.length - 1) {
                nextBtn.classList.add('hidden');
                submitBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                submitBtn.classList.add('hidden');
            }
        }

        // 选择选项
        function selectOption(optionIdx) {
            answers[currentQuestion] = optionIdx;
            // 仅更新选项样式，不重建 DOM
            document.querySelectorAll('#questionContainer .option').forEach((el, i) => {
                if (i === optionIdx) el.classList.add('selected');
                else el.classList.remove('selected');
            });
            // 更新进度

            const progress = (answeredCount / QUESTIONS.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

        // 计算各维度得分
        function calculateDimensionScores() {
            return DIMENSIONS.map(dim => {
                const dimAnswers = dim.questions.map(qIdx => {
                    const selectedIdx = answers[qIdx];
                    return QUESTIONS[qIdx].options[selectedIdx].score;
                });
                // 直接用总分（不除以题数）
                const total = dimAnswers.reduce((a, b) => a + b, 0);

                // 根据你的判定标准
                // 认知/时间/方法：3-4=红灯, 5-6=黄灯, 7-9=绿灯
                // 心态：6-8=红灯, 9-12=黄灯, 13-18=绿灯
                let level, status, diagnosisData;
                if (dim.key === 'mindset') {
                    if (total >= 13) {
                        level = 'high'; status = 'green';
                        diagnosisData = dim.diagnosis.high;
                    } else if (total >= 9) {
                        level = 'mid'; status = 'yellow';
                        diagnosisData = dim.diagnosis.mid;
                    } else {
                        level = 'low'; status = 'red';
                        diagnosisData = dim.diagnosis.low;
                    }
                } else {
                    if (total >= 7) {
                        level = 'high'; status = 'green';
                        diagnosisData = dim.diagnosis.high;
                    } else if (total >= 5) {
                        level = 'mid'; status = 'yellow';
                        diagnosisData = dim.diagnosis.mid;
                    } else {
                        level = 'low'; status = 'red';
                        diagnosisData = dim.diagnosis.low;
                    }
                }

                return {
                    ...dim,
                    score: total,
                    maxScore: dim.key === 'mindset' ? 18 : 9,
                    level,
                    status,
                    diagnosis: diagnosisData
                };
            });
        }

        // 绘制雷达图
        function drawRadarChart(dimensions) {
            const canvas = document.getElementById('radarChart');
            const ctx = canvas.getContext('2d');
            
            const dpr = window.devicePixelRatio || 1;
            const w = 460;
            const h = 360;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            ctx.scale(dpr, dpr);
            
            const cx = w / 2;
            const cy = h / 2;
            const maxRadius = 100;

            ctx.clearRect(0, 0, w, h);

            const labels = dimensions.map(d => d.name);
            const normalizedValues = dimensions.map(d => d.score / d.maxScore);
            const n = labels.length;
            const angleStep = (Math.PI * 2) / n;
            const startAngle = -Math.PI / 2;

            // 绘制背景网格
            ctx.strokeStyle = '#e8e8e8';
            ctx.lineWidth = 1;
            for (let level = 1; level <= 3; level++) {
                const radius = (maxRadius * level) / 3;
                ctx.beginPath();
                for (let i = 0; i <= n; i++) {
                    const angle = startAngle + i * angleStep;
                    const x = cx + radius * Math.cos(angle);
                    const y = cy + radius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            // 绘制轴线
            ctx.strokeStyle = '#d0d0d0';
            ctx.lineWidth = 1;
            for (let i = 0; i < n; i++) {
                const angle = startAngle + i * angleStep;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + maxRadius * Math.cos(angle), cy + maxRadius * Math.sin(angle));
                ctx.stroke();
            }

            // 绘制数据区域
            ctx.beginPath();
            for (let i = 0; i < n; i++) {
                const angle = startAngle + i * angleStep;
                const valueRadius = normalizedValues[i] * maxRadius;
                const x = cx + valueRadius * Math.cos(angle);
                const y = cy + valueRadius * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(102, 126, 234, 0.25)';
            ctx.fill();
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 绘制数据点
            for (let i = 0; i < n; i++) {
                const angle = startAngle + i * angleStep;
                const valueRadius = normalizedValues[i] * maxRadius;
                const x = cx + valueRadius * Math.cos(angle);
                const y = cy + valueRadius * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#667eea';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // 绘制标签 - 上下左右四个固定位置，避免重叠
            ctx.fillStyle = '#333';
            ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
            ctx.textBaseline = 'middle';
            
            // 标签与图表的距离
            const labelOffset = 50;
            
            // 顶部标签 (12点钟方向)
            const topX = cx;
            const topY = cy - maxRadius - labelOffset;
            ctx.textAlign = 'center';
            ctx.fillText(labels[0], topX, topY);
            
            // 右侧标签 (3点钟方向)
            const rightX = cx + maxRadius + labelOffset;
            const rightY = cy;
            ctx.textAlign = 'left';
            ctx.fillText(labels[1], rightX, rightY);
            
            // 底部标签 (6点钟方向)
            const bottomX = cx;
            const bottomY = cy + maxRadius + labelOffset;
            ctx.textAlign = 'center';
            ctx.fillText(labels[2], bottomX, bottomY);
            
            // 左侧标签 (9点钟方向)
            const leftX = cx - maxRadius - labelOffset;
            const leftY = cy;
            ctx.textAlign = 'right';
            ctx.fillText(labels[3], leftX, leftY);
        }

                        <div class="diagnosis-content">${d.danger}</div>
                    </div>
                    
                    <div class="diagnosis-section">
                        <div class="diagnosis-label" style="color: #cf1322;">🚫 如果不解决</div>
                        <div class="diagnosis-content">${d.consequence}</div>
                    </div>
                    
                    <div class="diagnosis-section">
                        <div class="diagnosis-label" style="color: #667eea;">🎯 建议优先学习的章节</div>
                        <div class="diagnosis-table">
                            <table>
                                <thead>
                                    <tr>
                                        <th>章节</th>
                                        <th>解决什么</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${d.suggestions.map(s => `
                                    <tr>
                                        <td class="chapter-cell">${s.chapter}</td>
                                        <td>${s.desc}</td>
                                    </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    ` : `
                    <div class="diagnosis-section">
                        <div class="diagnosis-label" style="color: ${statusColors[dim.status]};">✅ 你的状况</div>
                        <div class="diagnosis-content">${d.situation}</div>
                    </div>
                    
                    <div class="diagnosis-section">
                        <div class="diagnosis-label" style="color: #667eea;">💡 提醒</div>
                        <div class="diagnosis-content reminder">${d.reminder}</div>
                    </div>
                    `}
                </div>
                `;
            }).join('');
        }

        // 渲染改进建议（详细版）
        function renderSuggestions(dimensions) {
            const container = document.getElementById('suggestionsContent');

            // 按优先级排序：红灯(1) > 黄灯(2) > 绿灯(3)
            const priorityMap = { low: 1, mid: 2, high: 3 };
            const sorted = [...dimensions].sort((a, b) => priorityMap[a.level] - priorityMap[b.level]);

            const redLights = sorted.filter(d => d.level === 'low');
            const yellowLights = sorted.filter(d => d.level === 'mid');
            const greenLights = sorted.filter(d => d.level === 'high');

            const statusColors = { red: '#cf1322', yellow: '#d48806', green: '#52c41a' };
            const statusBgColors = { red: 'rgba(207, 19, 34, 0.1)', yellow: 'rgba(212, 136, 6, 0.1)', green: 'rgba(82, 196, 26, 0.1)' };

            let html = '';

            // 优先级排序标题
            html += `
                <div class="priority-header">
                    <div class="priority-header-title">📋 学习优先级排序</div>
                    <div class="priority-header-subtitle">先解决主要薄弱项，再处理次要薄弱项，绿灯维度保持即可</div>
                </div>
            `;

            // 红灯维度（主要薄弱项）- 显示详细建议
            if (redLights.length > 0) {
                html += `<div class="priority-section">`;
                redLights.forEach(dim => {
                    const d = dim.diagnosis;
                    html += `
                        <div class="chapter-card" style="border-left: 4px solid ${statusColors.red};">
                            <div class="chapter-card-header">
                                <span class="chapter-dim-name" style="color: ${statusColors.red};">${dim.icon} ${dim.name}</span>
                                <span class="chapter-dim-badge" style="background: ${statusBgColors.red}; color: ${statusColors.red};">🚨 主要薄弱项</span>
                            </div>
                            <div class="chapter-list">
                                ${d.suggestions.map(s => `
                                    <div class="chapter-item">
                                        <div class="chapter-name">${s.chapter}</div>
                                        <div class="chapter-desc">${s.desc}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            // 黄灯维度（次要薄弱项）- 显示详细建议
            if (yellowLights.length > 0) {
                html += `<div class="priority-section">`;
                yellowLights.forEach(dim => {
                    const d = dim.diagnosis;
                    html += `
                        <div class="chapter-card" style="border-left: 4px solid ${statusColors.yellow};">
                            <div class="chapter-card-header">
                                <span class="chapter-dim-name" style="color: ${statusColors.yellow};">${dim.icon} ${dim.name}</span>
                                <span class="chapter-dim-badge" style="background: ${statusBgColors.yellow}; color: ${statusColors.yellow};">⚠️ 次要薄弱项</span>
                            </div>
                            <div class="chapter-list">
                                ${d.suggestions.map(s => `
                                    <div class="chapter-item">
                                        <div class="chapter-name">${s.chapter}</div>
                                        <div class="chapter-desc">${s.desc}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            // 绿灯维度 - 只需保持
            if (greenLights.length > 0) {
                html += `
                    <div class="green-section">
                        <div class="green-title">✅ 绿灯维度（保持即可）</div>
                        <div class="green-items">
                            ${greenLights.map(d => `<span class="green-tag">${d.icon} ${d.name}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            // 评分规则卡片
            html += `
                <div class="rules-card">
                    <div class="rules-title">📊 评分规则</div>
                    <div class="rules-grid">
                        <div class="rule-item">
                            <div class="rule-dim">认知/时间/方法（满分9）</div>
                            <div class="rule-scores">
                                <span class="score-badge" style="background: rgba(207, 19, 34, 0.1); color: #cf1322;">3-4分 🚨</span>
                                <span class="score-badge" style="background: rgba(212, 136, 6, 0.1); color: #d48806;">5-6分 ⚠️</span>
                                <span class="score-badge" style="background: rgba(82, 196, 26, 0.1); color: #52c41a;">7-9分 ✅</span>
                            </div>
                        </div>
                        <div class="rule-item">
                            <div class="rule-dim">心态/方向（满分18）</div>
                            <div class="rule-scores">
                                <span class="score-badge" style="background: rgba(207, 19, 34, 0.1); color: #cf1322;">6-8分 🚨</span>
                                <span class="score-badge" style="background: rgba(212, 136, 6, 0.1); color: #d48806;">9-12分 ⚠️</span>
                                <span class="score-badge" style="background: rgba(82, 196, 26, 0.1); color: #52c41a;">13-18分 ✅</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            if (redLights.length === 0 && yellowLights.length === 0) {
                html += `<div class="all-good">🎉 你的备考状态已经很不错！继续保持当前节奏，注重细节提升。</div>`;
            }

            container.innerHTML = html;
        }

        // 渲染答题回顾
        function renderAnswerReview() {
            const container = document.getElementById('answerReview');
            
            container.innerHTML = QUESTIONS.map((q, idx) => {
                const selectedIdx = answers[idx];
                const selectedOpt = q.options[selectedIdx];
                return `
                    <div class="review-question">
                        <div class="review-question-title">${q.q}. ${q.title}</div>
                        <div class="review-answer">你的答案：${selectedOpt.label}. ${selectedOpt.text}</div>
                    </div>
                `;
            }).join('');
        }

        // 重新测试
        function restartTest() {
            answers = new Array(QUESTIONS.length).fill(null);
            currentQuestion = 0;

            document.getElementById('resultPage').classList.add('hidden');
            document.getElementById('testPage').classList.remove('hidden');
            renderCurrentQuestion();
        }

        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
