<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=公考自测诊断2.0.html">
<title>考公全景方法论 · 加载中</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-cream:#faf7f2;
  --bg-card:#ffffff;
  --text-dark:#2c2c2c;
  --text-mid:#6b6b6b;
  --text-light:#9a9a9a;
  --accent-orange:#d97757;
  --accent-orange-soft:#f4e4dc;
  --border:#e5e0d8;
  --shadow:0 2px 12px rgba(60,40,20,0.06);
  --shadow-hover:0 8px 30px rgba(60,40,20,0.15);
}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","微软雅黑",sans-serif;
  background:var(--bg-cream);
  color:var(--text-dark);
  font-size:16px;
  line-height:1.8;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ============ 顶部封面 ============ */
.cover{
  background:linear-gradient(135deg,#3a2a1f 0%,#5a4a3a 100%);
  color:#faf7f2;
  padding:72px 24px 56px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.cover::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 20% 30%,rgba(217,119,87,0.15),transparent 50%),
             radial-gradient(circle at 80% 70%,rgba(217,119,87,0.1),transparent 50%);
}
.cover-inner{position:relative;z-index:1;max-width:760px;margin:0 auto}
.cover .book-tag{
  display:inline-block;font-size:13px;letter-spacing:2px;
  padding:6px 16px;border:1px solid rgba(250,247,242,0.4);
  border-radius:20px;margin-bottom:24px;color:#e8c9b0;
}
.cover h1{
  font-size:38px;font-weight:700;line-height:1.35;
  margin-bottom:20px;letter-spacing:1px;
}
.cover .subtitle{
  font-size:16px;line-height:1.85;color:#d4c4b4;
  max-width:560px;margin:0 auto;
}
.cover .meta{
  margin-top:28px;font-size:13px;color:#b8a890;
  border-top:1px solid rgba(250,247,242,0.18);
  padding-top:20px;letter-spacing:1px;
}

/* ============ 卡片区域 ============ */
.main{
  flex:1;
  max-width:860px;
  margin:0 auto;
  padding:48px 24px 64px;
  width:100%;
}
.section-title{
  font-size:15px;
  color:var(--text-mid);
  margin-bottom:24px;
  padding-left:12px;
  border-left:3px solid var(--accent-orange);
}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:20px;
}
.card{
  display:block;
  text-decoration:none;
  color:inherit;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:28px 24px;
  box-shadow:var(--shadow);
  transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;
  position:relative;
  overflow:hidden;
}
.card::after{
  content:"";position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent-orange),#e8a080);
  transform:scaleX(0);transform-origin:left;transition:transform .3s ease;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:var(--shadow-hover);
  border-color:var(--accent-orange-soft);
}
.card:hover::after{transform:scaleX(1)}
.card .card-num{
  font-size:13px;color:var(--accent-orange);
  font-weight:600;letter-spacing:1px;margin-bottom:8px;
}
.card .card-title{
  font-size:18px;font-weight:700;color:var(--text-dark);
  margin-bottom:8px;line-height:1.4;
}
.card .card-desc{
  font-size:14px;color:var(--text-mid);line-height:1.7;
}
.card .card-arrow{
  margin-top:16px;font-size:13px;color:var(--accent-orange);
  display:flex;align-items:center;gap:4px;transition:gap .25s ease;
}
.card:hover .card-arrow{gap:8px}

/* ============ 页脚 ============ */
.footer{
  text-align:center;
  padding:32px 24px;
  font-size:13px;
  color:var(--text-light);
  border-top:1px solid var(--border);
}

/* ============ 移动端适配 ============ */
@media(max-width:600px){
  .cover{padding:48px 20px 40px}
  .cover h1{font-size:28px}
  .cover .subtitle{font-size:14px}
  .main{padding:32px 16px 48px}
  .cards{grid-template-columns:1fr;gap:16px}
}
</style>
</head>
<body>

<!-- 顶部封面 -->
<header class="cover">
  <div class="cover-inner">
    <span class="book-tag">考公全景方法论</span>
    <h1>版本导航</h1>
    <p class="subtitle">系统性备考指南 · 多种阅读体验<br>选择适合你的版本开始学习</p>
    <div class="meta">点击下方卡片进入对应版本</div>
  </div>
</header>

<!-- 卡片导航 -->
<main class="main">
  <div class="section-title">全部版本</div>
  <div class="cards">

    <a class="card" href="style-a-reading.html">
      <div class="card-num">A</div>
      <div class="card-title">沉浸阅读版</div>
      <div class="card-desc">以沉浸式阅读体验为核心，适合深度学习、系统通读。</div>
      <div class="card-arrow">进入 →</div>
    </a>

    <a class="card" href="style-b-graph.html">
      <div class="card-num">B</div>
      <div class="card-title">知识图谱版</div>
      <div class="card-desc">图谱式呈现知识结构，适合快速浏览全局框架。</div>
      <div class="card-arrow">进入 →</div>
    </a>

    <a class="card" href="style-c-b-hybrid.html">
      <div class="card-num">C-B</div>
      <div class="card-title">诊断驱动 · 图谱配色版</div>
      <div class="card-desc">诊断驱动式与图谱配色结合，兼顾诊断与视觉。</div>
      <div class="card-arrow">进入 →</div>
    </a>

    <a class="card" href="style-c-diagnostic.html">
      <div class="card-num">C</div>
      <div class="card-title">诊断驱动版</div>
      <div class="card-desc">以问题诊断为核心驱动学习路径，精准定位薄弱点。</div>
      <div class="card-arrow">进入 →</div>
    </a>

    <a class="card" href="style-d-diagnostic-graph.html">
      <div class="card-num">D</div>
      <div class="card-title">诊断 · 图表版</div>
      <div class="card-desc">诊断驱动与图表结合，数据可视化呈现学习进度。</div>
      <div class="card-arrow">进入 →</div>
    </a>

  </div>
</main>

<!-- 页脚 -->
<footer class="footer">
  考公全景方法论 · 系统性备考指南
</footer>

</body>
</html>
